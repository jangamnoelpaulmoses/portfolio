<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a12"/>
      <stop offset="1" stop-color="#10101c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.6">
      <stop stop-color="#7c5cff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="node" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7fe7ff"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>

  <!-- edges -->
  <g stroke="#7c5cff" stroke-opacity="0.35" stroke-width="2">
    <line x1="800" y1="500" x2="540" y2="320"/>
    <line x1="800" y1="500" x2="1080" y2="300"/>
    <line x1="800" y1="500" x2="1140" y2="600"/>
    <line x1="800" y1="500" x2="560" y2="700"/>
    <line x1="800" y1="500" x2="360" y2="520"/>
    <line x1="800" y1="500" x2="900" y2="760"/>
    <line x1="540" y1="320" x2="360" y2="520"/>
    <line x1="540" y1="320" x2="300" y2="260"/>
    <line x1="1080" y1="300" x2="1300" y2="240"/>
    <line x1="1080" y1="300" x2="1140" y2="600"/>
    <line x1="1140" y1="600" x2="1320" y2="700"/>
    <line x1="560" y1="700" x2="360" y2="520"/>
    <line x1="560" y1="700" x2="900" y2="760"/>
    <line x1="900" y1="760" x2="1140" y2="600"/>
  </g>

  <!-- node halos -->
  <g fill="#7fe7ff" fill-opacity="0.18" filter="url(#soft)">
    <circle cx="800" cy="500" r="46"/>
    <circle cx="1080" cy="300" r="26"/>
    <circle cx="540" cy="320" r="24"/>
  </g>

  <!-- nodes -->
  <g>
    <circle cx="800" cy="500" r="26" fill="url(#node)"/>
    <circle cx="540" cy="320" r="14" fill="#7fe7ff"/>
    <circle cx="1080" cy="300" r="16" fill="#7c5cff"/>
    <circle cx="1140" cy="600" r="13" fill="#c6ff3d"/>
    <circle cx="560" cy="700" r="13" fill="#7c5cff"/>
    <circle cx="360" cy="520" r="11" fill="#7fe7ff"/>
    <circle cx="900" cy="760" r="12" fill="#ff4d6d"/>
    <circle cx="300" cy="260" r="8" fill="#7fe7ff"/>
    <circle cx="1300" cy="240" r="9" fill="#7c5cff"/>
    <circle cx="1320" cy="700" r="9" fill="#c6ff3d"/>
  </g>

  <text x="110" y="180" font-family="'Clash Display', Inter, sans-serif" font-size="120" font-weight="600" fill="#f4f1ea" letter-spacing="-4">BrainOS</text>
  <text x="116" y="250" font-family="'JetBrains Mono', monospace" font-size="30" fill="#f4f1ea" fill-opacity="0.5" letter-spacing="6">KNOWLEDGE  GRAPH  ·  FOR  AGENTS</text>
</svg>
